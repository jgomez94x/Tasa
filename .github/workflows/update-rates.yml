name: Update rates

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update rates file
        run: node scripts/update-rates.js

      - name: Commit rates file
        run: |
          if git diff --quiet -- data/rates.json; then
            echo "Rates did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rates.json
          git commit -m "Update rates"
          git push
